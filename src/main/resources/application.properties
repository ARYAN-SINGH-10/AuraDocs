spring.application.name=auradocs

# Allow large PDF uploads (up to 100MB per file, 200MB per request)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Server port
server.port=8080

# LibreOffice installation path (adjust if installed elsewhere)
libreoffice.path=C:/Program Files/LibreOffice/program/soffice.exe
