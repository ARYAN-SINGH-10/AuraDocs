<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - AuraDocs' : 'AuraDocs - Every PDF Tool You Need'}">AuraDocs</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/logo.png}">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Compiled Tailwind CSS -->
    <link rel="stylesheet" th:href="@{/css/output.css(v='20')}">
    
    <script>
        // Inline script to prevent theme flash
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-white dark:bg-[#0B0F19] text-slate-900 dark:text-slate-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 w-full bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <!-- Logo -->
                <a href="/" class="flex-shrink-0 flex items-center gap-2">
                    <div class="h-12 w-12 overflow-hidden relative rounded-md">
                        <!-- Show the logo image properly filling the container -->
                        <img th:src="@{/images/logo.png}" alt="AuraDocs" class="w-full h-full object-cover" />
                    </div>
                    <span class="font-bold text-2xl text-slate-900 dark:text-white tracking-tight" style="font-family: 'Outfit', sans-serif;">AuraDocs</span>
                </a>

                <!-- Right Actions & Theme Toggle -->
                <div class="flex items-center gap-6">
                    <button id="theme-toggle" class="p-2 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" aria-label="Toggle Theme">
                        <i id="theme-toggle-dark-icon" data-lucide="moon" class="hidden w-5 h-5"></i>
                        <i id="theme-toggle-light-icon" data-lucide="sun" class="hidden w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow">
        <div layout:fragment="content">
            <!-- Child pages will inject content here -->
        </div>
    </main>

    <!-- Features Banner Footer -->
    <footer class="bg-slate-50 dark:bg-[#151B2B] border-t border-slate-100 dark:border-slate-800/50 mt-10 transition-colors duration-300">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="flex flex-col md:flex-row justify-center gap-12 md:gap-24">
                
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-purple-100 text-purple-600 dark:bg-purple-900/40 dark:text-purple-400">
                        <i data-lucide="shield" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-900 dark:text-white text-sm">100% Stateless</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">We don't store your files.</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-green-100 text-green-600 dark:bg-green-900/40 dark:text-green-400">
                        <i data-lucide="shield-check" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-900 dark:text-white text-sm">Secure & Private</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Your files are safe with us.</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-orange-100 text-orange-600 dark:bg-orange-900/40 dark:text-orange-400">
                        <i data-lucide="zap" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-slate-900 dark:text-white text-sm">Lightning Fast</h4>
                        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">Get things done instantly.</p>
                    </div>
                </div>

            </div>
        </div>
        <div class="border-t border-slate-200 dark:border-slate-800 py-6 text-center">
            <p class="text-xs text-slate-400 dark:text-slate-500">&copy; 2026 AuraDocs. All rights reserved.</p>
        </div>
    </footer>

    <!-- Theme and Icon scripts -->
    <script th:src="@{/js/theme.js}"></script>
    <script>
        // Initialize lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
